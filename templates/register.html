<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0e14;
      --surface:  #12161f;
      --border:   #1e2433;
      --accent:   #4ade80;
      --accent2:  #22c55e;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --error-bg: #1f0a0a;
      --error:    #f87171;
      --ok-bg:    #0a1f12;
      --ok:       #4ade80;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      animation: fadeUp .4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: .1em;
      margin-bottom: 32px;
    }
    .logo span { color: var(--muted); }

    h1 { font-size: 24px; font-weight: 500; margin-bottom: 8px; }

    .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 32px; }

    .flash {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      border: 1px solid transparent;
    }
    .flash.error   { background: var(--error-bg); color: var(--error);   border-color: #3f1010; }
    .flash.success { background: var(--ok-bg);    color: var(--ok);      border-color: #0f3320; }

    label {
      display: block;
      font-size: 12px;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--muted);
      letter-spacing: .06em;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 14px;
      font-family: 'IBM Plex Sans', sans-serif;
      color: var(--text);
      margin-bottom: 20px;
      transition: border-color .2s;
      outline: none;
    }
    input:focus { border-color: var(--accent); }

    /* Indicador de força de senha */
    .strength-bar {
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      margin-top: -14px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      transition: width .3s, background .3s;
    }

    button {
      width: 100%;
      background: var(--accent);
      color: #0b0e14;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'IBM Plex Sans', sans-serif;
      cursor: pointer;
      transition: background .2s, transform .1s;
      margin-top: 4px;
    }
    button:hover  { background: var(--accent2); }
    button:active { transform: scale(.98); }

    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 13px;
      color: var(--muted);
    }
    .footer a { color: var(--accent); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    .hint { font-size: 12px; color: var(--muted); margin-top: -14px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">[ <span>api</span> ] datastore</div>

    <h1>Criar conta</h1>
    <p class="subtitle">Preencha os dados abaixo para se cadastrar.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="">
      <label for="username">USUÁRIO</label>
      <input
        id="username"
        name="username"
        type="text"
        placeholder="seu_usuario"
        autocomplete="username"
        required
      >

      <label for="password">SENHA</label>
      <input
        id="password"
        name="password"
        type="password"
        placeholder="mínimo 6 caracteres"
        autocomplete="new-password"
        required
        oninput="checkStrength(this.value)"
      >
      <!-- Barra visual de força da senha (JS puro, sem libs) -->
      <div class="strength-bar"><div class="strength-fill" id="sbar"></div></div>

      <label for="confirm">CONFIRMAR SENHA</label>
      <input
        id="confirm"
        name="confirm"
        type="password"
        placeholder="••••••••"
        autocomplete="new-password"
        required
      >

      <button type="submit">Criar conta →</button>
    </form>

    <div class="footer">
      Já tem conta? <a href="{{ url_for('login') }}">Entrar</a>
    </div>
  </div>

  <script>
    function checkStrength(val) {
      const bar = document.getElementById('sbar');
      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const pct   = [0, 20, 40, 65, 85, 100][score];
      const color = ['#f87171','#fb923c','#facc15','#a3e635','#4ade80'][Math.max(score-1,0)];
      bar.style.width      = pct + '%';
      bar.style.background = color;
    }
  </script>
</body>
</html>
